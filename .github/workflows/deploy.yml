name: Deploy Backend to AWS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Inject Secret Files
        run: |
          cat << 'EOF' > src/main/resources/application-secret.yml
          ${{ secrets.APPLICATION_SECRET_YML }}
          EOF
          cat << 'EOF' > src/main/resources/firebase-service-account.json
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          EOF
          
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        
      - name: Build with Gradle
        run: ./gradlew build -x test
        
      - name: Copy jar to AWS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          source: "build/libs/kuji-server-0.0.1-SNAPSHOT.jar"
          target: "~/"
          strip_components: 2

      - name: Restart Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          script: |
            # Nginx 업로드 용량 제한 해제 (413 Request Entity Too Large 에러 방지)
            echo "client_max_body_size 50M;" | sudo tee /etc/nginx/conf.d/upload_size.conf
            sudo systemctl reload nginx
            
            # Move the jar to the final name expected by the systemd service
            mv ~/kuji-server-0.0.1-SNAPSHOT.jar ~/kuji-server.jar
            sudo systemctl restart kuji-server
            
            # 💡 서버 기동 후 상태를 10초 대기한 뒤 확인하고 에러 로그 출력 (디버깅용)
            sleep 10
            sudo systemctl status kuji-server; sudo journalctl -u kuji-server -n 100 --no-pager
