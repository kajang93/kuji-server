spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/kuji_db
    username: kuji_user
    password: kuji2025local!
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
server:
  port: 8080
  address: 0.0.0.0

jwt:
  # 💡 우리 서버만의 비밀키 (실무에선 절대 유출되면 안 됨! 최소 32글자 이상 작성)
  secret: kuji-secret-key-kuji-secret-key-kuji-secret-key
  # 💡 토큰 유효 시간 (밀리초 단위, 3600000 = 1시간)
  expiration: 3600000

file:
  upload-dir: uploads